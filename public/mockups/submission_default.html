<!DOCTYPE html>
<html class="light" lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
    <title>桃牛苑 - シフト希望提出</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9fe;
            -webkit-tap-highlight-color: transparent;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
        }
    </style>
</head>
<body class="bg-background text-on-surface">
    <!-- TopAppBar -->
    <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white shadow-sm border-b border-slate-200">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-[#0058bc]" data-icon="restaurant">restaurant</span>
            <h1 class="text-lg font-bold text-[#0058bc]">桃牛苑</h1>
        </div>
        <div class="flex items-center gap-4">
            <button class="material-symbols-outlined text-slate-500">notifications</button>
            <div class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden border border-slate-300">
                <span class="text-xs flex justify-center items-center h-full">👤</span>
            </div>
        </div>
    </header>

    <main class="pt-20 pb-40 px-4 max-w-md mx-auto">
        <!-- Submission Deadline Banner -->
        <div class="mb-6 bg-red-100 text-red-800 p-4 rounded-xl flex items-center gap-3 shadow-sm animate-pulse">
            <span class="material-symbols-outlined">alarm</span>
            <div>
                <p class="text-xs font-bold uppercase tracking-wider opacity-85">SUBMISSION DEADLINE</p>
                <p class="text-md font-bold">提出期限：10日 23:59</p>
            </div>
        </div>

        <!-- Period Selector / Title -->
        <section class="mb-6">
            <div class="flex items-end justify-between mb-2">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">希望提出</h2>
                    <p class="text-slate-500 text-sm">対象期間：7月16日(火) 〜 7月31日(水)</p>
                </div>
                <div class="bg-[#0058bc]/10 text-[#0058bc] px-3 py-1 rounded-full text-xs font-bold">後半</div>
            </div>
        </section>

        <!-- Default Pattern Control -->
        <div class="mb-6">
            <p class="text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">未入力日のデフォルト設定</p>
            <div class="flex bg-slate-200 rounded-xl p-1 gap-1">
                <button id="pattern-avail" class="flex-grow py-2 rounded-lg text-xs font-bold transition-all bg-white text-[#0058bc] shadow-sm border-0 cursor-pointer">
                    出勤可能
                </button>
                <button id="pattern-off" class="flex-grow py-2 rounded-lg text-xs font-medium transition-all text-slate-600 hover:bg-slate-300 border-0 cursor-pointer">
                    休み希望
                </button>
            </div>
        </div>

        <!-- Calendar Card -->
        <div class="bg-white rounded-[20px] p-4 shadow-sm border border-slate-200">
            <div class="calendar-grid mb-2">
                <div class="text-center text-xs font-bold text-slate-400">日</div>
                <div class="text-center text-xs font-bold text-slate-400">月</div>
                <div class="text-center text-xs font-bold text-slate-400">火</div>
                <div class="text-center text-xs font-bold text-slate-400">水</div>
                <div class="text-center text-xs font-bold text-slate-400">木</div>
                <div class="text-center text-xs font-bold text-slate-400">金</div>
                <div class="text-center text-xs font-bold text-slate-400">土</div>
            </div>
            <div class="calendar-grid" id="calendar">
                <div class="h-14"></div> <!-- Sun -->
                <div class="h-14"></div> <!-- Mon -->
            </div>
            <div class="mt-6 pt-4 border-t border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-[#0058bc]"></div>
                    <span class="text-xs font-semibold text-slate-600">出勤可能</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-slate-400"></div>
                    <span class="text-xs font-semibold text-slate-600">休み希望</span>
                </div>
            </div>
        </div>

        <div class="mt-6 p-4 bg-slate-50 rounded-xl border border-slate-200 flex items-start gap-3">
            <span class="material-symbols-outlined text-slate-500">info</span>
            <p class="text-xs text-slate-600">
                日付をタップして希望を切り替えてください。未入力の日程は選択したデフォルト設定（出勤可能/休み希望）として送信されます。
            </p>
        </div>
    </main>

    <!-- Fixed Bottom Actions -->
    <div class="fixed bottom-0 left-0 w-full z-40 px-4 pb-24 md:pb-8">
        <button id="submit-btn" class="w-full h-[56px] bg-[#0058bc] text-white font-bold rounded-full shadow-lg flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
            <span class="material-symbols-outlined">send</span>
            シフトを提出する
        </button>
    </div>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-white border-t border-slate-200 shadow-lg">
        <a class="flex flex-col items-center justify-center text-slate-400 text-xs hover:text-[#0058bc]" href="#">
            <span class="material-symbols-outlined">calendar_month</span>
            <span>シフト表</span>
        </a>
        <a class="flex flex-col items-center justify-center text-[#0058bc] text-xs font-bold" href="#">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
            <span>希望提出</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 text-xs hover:text-[#0058bc]" href="#">
            <span class="material-symbols-outlined">settings</span>
            <span>管理者設定</span>
        </a>
    </nav>

    <script>
        const days = [
            { d: 16, w: '火' }, { d: 17, w: '水' }, { d: 18, w: '木' }, { d: 19, w: '金' }, { d: 20, w: '土' },
            { d: 21, w: '日' }, { d: 22, w: '月' }, { d: 23, w: '火' }, { d: 24, w: '水' }, { d: 25, w: '木' },
            { d: 26, w: '金' }, { d: 27, w: '土' }, { d: 28, w: '日' }, { d: 29, w: '月' }, { d: 30, w: '火' },
            { d: 31, w: '水' }
        ];
        
        let currentPattern = "A"; // A = 出勤可能, B = 休み希望
        const calendarEl = document.getElementById('calendar');
        
        function renderCalendar() {
            // 清掃
            const existingCells = calendarEl.querySelectorAll('.hope-cell');
            existingCells.forEach(c => c.remove());

            days.forEach(day => {
                const dayDiv = document.createElement('div');
                dayDiv.className = `hope-cell h-14 flex flex-col items-center justify-center rounded-xl cursor-pointer transition-all active:scale-95 border border-transparent`;
                
                if (currentPattern === "A") {
                    // デフォルト出勤可能
                    dayDiv.classList.add('bg-[#0058bc]/10');
                    dayDiv.innerHTML = `
                        <span class="text-sm font-bold text-slate-800">${day.d}</span>
                        <span class="text-[10px] uppercase opacity-60">${day.w}</span>
                        <div class="status-indicator w-1.5 h-1.5 rounded-full mt-1 bg-[#0058bc]"></div>
                    `;
                    dayDiv.dataset.status = "available";
                } else {
                    // デフォルト休み希望
                    dayDiv.classList.add('bg-slate-100');
                    dayDiv.innerHTML = `
                        <span class="text-sm font-bold text-slate-800">${day.d}</span>
                        <span class="text-[10px] uppercase opacity-60">${day.w}</span>
                        <div class="status-indicator w-1.5 h-1.5 rounded-full mt-1 bg-slate-400"></div>
                        <span class="text-[9px] font-bold text-slate-500 mt-0.5">休み</span>
                    `;
                    dayDiv.dataset.status = "off";
                }

                dayDiv.onclick = () => {
                    if(dayDiv.dataset.status === "available") {
                        dayDiv.dataset.status = "off";
                        dayDiv.className = `hope-cell h-14 flex flex-col items-center justify-center rounded-xl cursor-pointer transition-all active:scale-95 border border-transparent bg-slate-100`;
                        dayDiv.querySelector('.status-indicator').className = 'status-indicator w-1.5 h-1.5 rounded-full mt-1 bg-slate-400';
                        dayDiv.querySelector('.status-indicator').nextElementSibling?.remove();
                        const label = document.createElement('span');
                        label.className = "text-[9px] font-bold text-slate-500 mt-0.5";
                        label.innerText = "休み";
                        dayDiv.appendChild(label);
                    } else {
                        dayDiv.dataset.status = "available";
                        dayDiv.className = `hope-cell h-14 flex flex-col items-center justify-center rounded-xl cursor-pointer transition-all active:scale-95 border border-transparent bg-[#0058bc]/10`;
                        dayDiv.querySelector('.status-indicator').className = 'status-indicator w-1.5 h-1.5 rounded-full mt-1 bg-[#0058bc]';
                        dayDiv.lastElementChild?.remove();
                        if (currentPattern === "B") {
                            // Bのときは「可能」というテキストバッジを追加
                            const label = document.createElement('span');
                            label.className = "text-[9px] font-bold text-[#0058bc] mt-0.5";
                            label.innerText = "可能";
                            dayDiv.appendChild(label);
                        }
                    }
                };
                calendarEl.appendChild(dayDiv);
            });
        }

        renderCalendar();

        // Pattern switching logic
        const btnAvail = document.getElementById('pattern-avail');
        const btnOff = document.getElementById('pattern-off');

        btnAvail.onclick = () => {
            currentPattern = "A";
            btnAvail.className = "flex-grow py-2 rounded-lg text-xs font-bold transition-all bg-white text-[#0058bc] shadow-sm border-0 cursor-pointer";
            btnOff.className = "flex-grow py-2 rounded-lg text-xs font-medium transition-all text-slate-600 hover:bg-slate-300 border-0 cursor-pointer";
            renderCalendar();
        };

        btnOff.onclick = () => {
            currentPattern = "B";
            btnOff.className = "flex-grow py-2 rounded-lg text-xs font-bold transition-all bg-white text-[#0058bc] shadow-sm border-0 cursor-pointer";
            btnAvail.className = "flex-grow py-2 rounded-lg text-xs font-medium transition-all text-slate-600 hover:bg-slate-300 border-0 cursor-pointer";
            renderCalendar();
        };

        // Submit Button micro-interaction
        document.getElementById('submit-btn').addEventListener('click', function() {
            const btn = this;
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 送信中...';
            btn.disabled = true;
            btn.style.opacity = '0.7';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> 送信完了';
                btn.className = btn.className.replace('bg-[#0058bc]', 'bg-[#008733]');
                btn.style.opacity = '1';
                
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.className = btn.className.replace('bg-[#008733]', 'bg-[#0058bc]');
                    btn.disabled = false;
                }, 2000);
            }, 1500);
        });
    </script>
</body>
</html>
